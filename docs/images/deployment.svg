<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#0078D4"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="960" height="500" rx="12" fill="#f9fafb"/>
  <text x="480" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Azure Deployment Architecture</text>

  <!-- Azure Cloud boundary -->
  <rect x="250" y="55" width="460" height="420" rx="16" fill="#e8f4fd" stroke="#0078D4" stroke-width="2" filter="url(#shadow)"/>
  <rect x="250" y="55" width="460" height="38" rx="16" fill="#0078D4"/>
  <rect x="250" y="78" width="460" height="15" fill="#0078D4"/>
  <text x="275" y="80" font-size="15" font-weight="700" fill="white">☁ Microsoft Azure</text>

  <!-- Resource Group -->
  <rect x="275" y="105" width="410" height="350" rx="12" fill="white" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="295" y="126" font-size="12" font-weight="600" fill="#64748b">📁 Resource Group</text>

  <!-- App Service Plan -->
  <rect x="295" y="140" width="370" height="50" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="480" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">App Service Plan (Linux)</text>
  <text x="480" y="178" text-anchor="middle" font-size="10" fill="#6b7280">Configurable SKU: F1 · B1 · B2 · S1 · P1v3</text>

  <!-- Web App -->
  <rect x="295" y="205" width="370" height="230" rx="10" fill="white" stroke="#0078D4" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="295" y="205" width="370" height="30" rx="10" fill="#0078D4"/>
  <rect x="295" y="225" width="370" height="10" fill="#0078D4"/>
  <text x="315" y="225" font-size="12" font-weight="700" fill="white">🌐 App Service (Web App)</text>
  <text x="537" y="225" font-size="10" fill="#93c5fd">.NET 10.0 Runtime</text>

  <!-- Endpoints inside web app -->
  <rect x="315" y="248" width="160" height="36" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="395" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">REST API</text>
  <text x="395" y="278" text-anchor="middle" font-size="9" fill="#6b7280">/api/*</text>

  <rect x="487" y="248" width="160" height="36" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="567" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">MCP Server</text>
  <text x="567" y="278" text-anchor="middle" font-size="9" fill="#6b7280">/mcp</text>

  <rect x="315" y="296" width="160" height="36" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="395" y="312" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">AG-UI Agent</text>
  <text x="395" y="326" text-anchor="middle" font-size="9" fill="#6b7280">/agent-chat</text>

  <rect x="487" y="296" width="160" height="36" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="567" y="312" text-anchor="middle" font-size="10" font-weight="600" fill="#0284c7">OpenAPI</text>
  <text x="567" y="326" text-anchor="middle" font-size="9" fill="#6b7280">/openapi/v1.json</text>

  <!-- React SPA -->
  <rect x="315" y="344" width="332" height="36" rx="6" fill="#20232a"/>
  <text x="481" y="367" text-anchor="middle" font-size="11" font-weight="600" fill="#61DAFB">⚛ React SPA (wwwroot/)</text>

  <!-- Environment variables -->
  <rect x="315" y="392" width="332" height="30" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="481" y="412" text-anchor="middle" font-size="9" fill="#64748b">env: AZURE_OPENAI_ENDPOINT · AZURE_OPENAI_API_KEY · AZURE_OPENAI_DEPLOYMENT_NAME</text>

  <!-- Azure OpenAI (external) -->
  <rect x="760" y="130" width="170" height="100" rx="12" fill="white" stroke="#0078D4" stroke-width="2" filter="url(#shadow)"/>
  <rect x="760" y="130" width="170" height="28" rx="12" fill="#0078D4"/>
  <rect x="760" y="148" width="170" height="10" fill="#0078D4"/>
  <text x="775" y="150" font-size="11" font-weight="700" fill="white">🧠 Azure OpenAI</text>
  <text x="845" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">gpt-4o</text>
  <text x="845" y="198" text-anchor="middle" font-size="9" fill="#6b7280">Chat Completions</text>
  <text x="845" y="212" text-anchor="middle" font-size="9" fill="#6b7280">Function Calling</text>

  <!-- Arrow: Web App → Azure OpenAI -->
  <line x1="665" y1="280" x2="758" y2="200" stroke="#0078D4" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="720" y="230" font-size="9" fill="#0078D4" font-weight="600">HTTPS</text>

  <!-- Users -->
  <rect x="30" y="200" width="170" height="70" rx="10" fill="white" stroke="#6b7280" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">👥 Users</text>
  <text x="115" y="242" text-anchor="middle" font-size="10" fill="#6b7280">Browser / Console</text>
  <text x="115" y="258" text-anchor="middle" font-size="10" fill="#6b7280">Agent Clients</text>

  <!-- Arrow: Users → Web App -->
  <line x1="200" y1="235" x2="293" y2="310" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="236" y="262" font-size="9" fill="#16a34a" font-weight="600">HTTPS</text>

  <!-- CI/CD -->
  <rect x="30" y="350" width="170" height="80" rx="10" fill="white" stroke="#6b7280" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="376" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">⚙️ GitHub Actions</text>
  <text x="115" y="394" text-anchor="middle" font-size="10" fill="#6b7280">CI/CD Pipeline</text>
  <text x="115" y="410" text-anchor="middle" font-size="10" fill="#6b7280">Bicep + Zip Deploy</text>

  <!-- Arrow: CI/CD → Azure -->
  <line x1="200" y1="385" x2="293" y2="365" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="236" y="368" font-size="9" fill="#0078D4" font-weight="600">Deploy</text>

  <!-- GitHub Actions secrets box -->
  <rect x="760" y="290" width="170" height="160" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="845" y="312" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">🔑 GitHub Secrets</text>
  <text x="775" y="334" font-size="9" fill="#6b7280">AZURE_CLIENT_ID</text>
  <text x="775" y="350" font-size="9" fill="#6b7280">AZURE_CLIENT_SECRET</text>
  <text x="775" y="366" font-size="9" fill="#6b7280">AZURE_TENANT_ID</text>
  <text x="775" y="382" font-size="9" fill="#6b7280">AZURE_SUBSCRIPTION_ID</text>
  <text x="775" y="402" font-size="9" fill="#0078D4">AZURE_OPENAI_ENDPOINT</text>
  <text x="775" y="418" font-size="9" fill="#0078D4">AZURE_OPENAI_API_KEY</text>
  <text x="775" y="438" font-size="9" fill="#64748b">+ vars: APP_NAME, RG, etc.</text>
</svg>
